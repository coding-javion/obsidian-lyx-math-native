name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  macos-arm64:
    name: macOS arm64 release
    runs-on: macos-14
    env:
      LYX_VERSION: "2.5.1"
      LYX_SOURCE_URL: "https://ftp.lyx.org/pub/lyx/stable/2.5.x/lyx-2.5.1.tar.xz"
      LYX_BUILD_JOBS: "4"
    steps:
      - name: Check out plugin source
        uses: actions/checkout@v4

      - name: Set build paths
        run: |
          echo "LYX_SOURCE_DIR=$RUNNER_TEMP/lyx-2.5.1" >> "$GITHUB_ENV"
          echo "LYX_BUILD_DIR=$RUNNER_TEMP/lyx-build" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: |
          brew install boost cmake gettext hunspell pkg-config qt
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix gettext)/bin" >> "$GITHUB_PATH"

      - name: Download LyX source
        run: |
          set +e
          curl --fail --location --retry 3 "$LYX_SOURCE_URL" -o "$RUNNER_TEMP/lyx.tar.xz"
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            if [ "$status" -ne 60 ]; then
              exit "$status"
            fi
            echo "::warning::TLS certificate verification failed for $LYX_SOURCE_URL; retrying with curl --insecure."
            curl --fail --location --retry 3 --insecure "$LYX_SOURCE_URL" -o "$RUNNER_TEMP/lyx.tar.xz"
          fi
          mkdir -p "$LYX_SOURCE_DIR"
          tar -xf "$RUNNER_TEMP/lyx.tar.xz" -C "$LYX_SOURCE_DIR" --strip-components=1

      - name: Apply LyX sidecar patch
        run: patch -d "$LYX_SOURCE_DIR" -p1 < patches/lyx-2.5.1-mathd-cmake.patch

      - name: Install Node package metadata
        run: npm install --ignore-scripts

      - name: Configure LyX core
        run: npm run lyx:configure

      - name: Build LyX core targets
        run: npm run lyx:build-core

      - name: Configure native sidecar
        run: npm run native:configure:lyx

      - name: Build native sidecar
        run: npm run native:build

      - name: Package native sidecar
        run: npm run native:package

      - name: Package LyX runtime support files
        run: npm run support:package

      - name: Package macOS app sidecar
        run: npm run native:package:macos-app

      - name: Test native protocol
        run: npm test

      - name: Create installable plugin zip
        run: npm run release:zip

      - name: Create corresponding source tarball
        run: INCLUDE_LYX_SOURCE=1 npm run release:source

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-lyx-math-native-macos-arm64
          path: |
            dist/*.zip
            dist/*.tar.gz

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.tar.gz \
            --title "$GITHUB_REF_NAME" \
            --notes "Automated macOS arm64 release for $GITHUB_REF_NAME."
